<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>What's in my bag</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka&display=swap" rel="stylesheet">

<style>
body {
    background: #B31F00;
    color: black;
    text-align: center;
    font-family: 'Fredoka', sans-serif;
}

#bag {
    width: 200px;
    margin: 50px auto;
}

#bag img {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

#objects {
    margin-top: 20px;
}

.object {
    display: inline-block;
    margin: 10px;
    cursor: pointer;
}

.object img {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.object img:hover {
    transform: scale(1.15);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

#description {
    margin-top: 20px;
    font-size: 18px;
    min-height: 60px;
    padding: 0 20px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    background: #FFABE6;
    border: none;
    color: black;
    border-radius: 25px;
    box-shadow: 0 5px 0 #d98cc0;
}

button:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #d98cc0;
}

#finalText {
    display: none;
    font-size: 42px;
    margin-top: 40px;
    color: #FFABE6;
    text-shadow: 2px 2px 0 black;
}
</style>
</head>

<body>

<div id="bag">
    <img src="bag.JPG" alt="sac">
</div>

<button id="mainBtn">what’s in my bag 💖</button>

<div id="objects"></div>

<div id="description"></div>

<button id="finalBtn" style="display:none;">un petit mot pour toi 💌</button>

<div id="finalText">💛 ÉCRIS TON MESSAGE ICI 💛</div>

<script>

const items = [
    {
        img: "book.JPG",
        name: "Ton livre",
        desc: "Alala qui serais tu sans un livre avec toi, que ce soit un livre personnel, ou bien un du prix azur, tu sera toujours accompagné d’un livre, d’un carnet ou d’une note. Sur celle-ci, tu pourras noter toutes nos aventures, ainsi que relever tout mon amour pour toi."
    },
    {
        img: "gaucho.JPG",
        name: "ANTIFA !!!",
        desc: "Et hop un pims ANTIFA dans ton sac, quelle gaucho serait tu sans lui ? Tu l’a toujours avec toi pour pouvoir dire « AH OUI !? ANTI FAH !!! » (pardon…) grâce à toi j’ai pu m’intéresser un peu plus à la politique. Et je te remercie car grâce à ça on peut hate encore plus à deux mouehehehe."
    },
    {
        img: "lipstick.JPG",
        name: "Ton rouge à lèvre",
        desc: "Alors je sais pas comment il fait pour être encore plein après tout les bisous qu’on se fait mais il est encore là, grâce à lui tu laisse ta trace sur moi, dans mon cou, sur mes joues ou sur mon front, mange moi autant que tu le souhaite avec."
    },
    {
        img: "phone.JPG",
        name: "Ton téléphone",
        desc: "DRING ! DRING ! C’EST TON COPAIN QUI T’APPELLE !!!!! Et je n’arrêterais jamais de t’appeler Meu Anjinho, je t’appelerais peu importe le temps qu’il fait, et peu importe le lieu, si je peut entendre ta voix."
    },
    {
        img: "veuve.JPG",
        name: "Ta teinture",
        desc: "HAHAHHAH imagine tu aurais toujours ta teinture dans ton sac, toi, mon amour, qui a peur de ces racines que j’adore énormément, le fait que quand on est ensemble, tu te fiche complètement de mon regard sur ces racines montre ta confiance en moi, sache que j’adore chaque aspects de toi, autant mental que physique. Je t’aime mon Ange."
    },
    {
        img: "heart.JPG",
        name: "Mon cœur",
        desc: "AH BAH LE VOICI LUI !!!! J’espère que tu en prend soin hein !?!?!?!? Je te confie jusqu’à…. Attend je compte…. TOUT LE TEMPS AAAAAA !!!! Mon coeur t’appartient pour l’éternité, moi y compris, je t’appartient mon Ange."
    },
    {
        img: "key.JPG",
        name: "La clé de mon cœur",
        desc: "OH ! bah tiens tu a la clé pour y accéder, mais celle là n’est que dans notre imagination car tu n’en a pas besoin, tu est à jamais en mon cœur désormais. Je te protège et te chérie dans celui ci, Je t’aime."
    },
    {
        img: "wallet.JPG",
        name: "Ton porte-monnaie",
        desc: "#thebestgirlfriendever qui a toujours une photo de nous dans son porte-monnaie, si je l’ai mis ici aussi c’est pour encore une fois m’excuser de toutes les dépenses que tu fait pour nous, j’ai hâte de pouvoir te rembourser, et qu’on soit quite la dessus."
    },
    {
        img: "polaroid.JPG",
        name: "Notre photo",
        desc: "Une petite photo de nous, pour ne jamais oublier tous ces moments ensemble."
    },
    {
        img: "sniffou.JPG",
        name: "Sniffou",
        desc: "Oh ! Je crois qu’il dort, essayons de ne pas faire de bruit pour ne pas le réveiller. Notre premier enfant, qu’est-ce qu’il grandit vite quand même, il a été la depuis le début, et restera avec nous jusqu’à la fin, qui n’arrivera donc jamais louehehehe, je vous garde tous avec moi, près de moi."
    }
];

let index = 0;

const mainBtn = document.getElementById("mainBtn");
const objectsDiv = document.getElementById("objects");
const desc = document.getElementById("description");
const finalBtn = document.getElementById("finalBtn");
const finalText = document.getElementById("finalText");

mainBtn.onclick = () => {
    if (index < items.length) {

        const currentItem = items[index];

        let obj = document.createElement("div");
        obj.className = "object";

        let img = document.createElement("img");
        img.src = currentItem.img;

        img.onclick = () => {
            desc.innerText = currentItem.name + " : " + currentItem.desc;
        };

        obj.appendChild(img);
        objectsDiv.appendChild(obj);

        index++;

    } else {
        objectsDiv.innerHTML = "";
        desc.innerText = "";
        index = 0;
        finalBtn.style.display = "inline-block";
    }
};

finalBtn.onclick = () => {
    finalText.style.display = "block";
};

</script>

</body>
</html>
